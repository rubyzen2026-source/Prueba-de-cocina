<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina en el Campo</title>
    <style>
        /* Estilo único: centrar todo en la pantalla */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #faf7f2; /* Color de fondo cálido */
            font-family: Arial, sans-serif;
        }
        
        /* Estilo del título/enlace */
        h1 a {
            font-size: 3rem;
            color: #6b4f3c; /* Color marrón como el campo */
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        /* Efecto al pasar el mouse */
        h1 a:hover {
            color: #8b6b4f; /* Color más claro */
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>
        <a href="https://www.youtube.com/@country_life_vlog" target="_blank">
            Cocina en el Campo
        </a>
    </h1>
</body>
</html>
